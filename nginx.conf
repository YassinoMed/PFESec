# ============================================================================
# nginx.conf — SecureRAG Hub — Reverse Proxy Configuration
# ============================================================================
#
# Architecture :
#   Internet → Nginx (:80) → Frontend statique (ai-soc-web/out/)
#                           → Backend Python (:8000) via /api/*
#
# Installation :
#   1. Copier ce fichier dans C:\nginx\conf\nginx.conf
#   2. Adapter les chemins ci-dessous à votre installation
#   3. Démarrer Nginx : C:\nginx\nginx.exe
#
# ============================================================================

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Taille max des requêtes (pour les gros prompts) ────────────────────
    client_max_body_size 10m;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  logs/access.log  main;
    error_log   logs/error.log   warn;

    # ════════════════════════════════════════════════════════════════════════
    # SERVEUR PRINCIPAL — HTTP (port 80)
    # ════════════════════════════════════════════════════════════════════════
    server {
        listen       80;
        # Remplacez par votre nom de domaine ou laissez _ pour accepter toute requête
        server_name  _;

        # ── Chemin vers le frontend Next.js exporté ────────────────────────
        # IMPORTANT : Adaptez ce chemin à votre installation.
        # Nginx sur Windows utilise les / au lieu des \.
        root  "C:/Users/User/Desktop/Nouveau dossier/mon-workspace-hf/security/ai-soc-web/out";
        index index.html;

        # ── Headers de sécurité ────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Reverse Proxy : API Backend Python (:8000) ─────────────────────
        # Toutes les requêtes /api/v1/* sont relayées à l'orchestrateur (port 8080)
        location /api/v1/ {
            proxy_pass         http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  60s;
            proxy_send_timeout     120s;
            proxy_read_timeout     300s;
            proxy_buffering off;
        }

        # Toutes les requêtes /api/* sont relayées au serveur d'inférence
        location /api/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts longs pour les inférences LLM (peut prendre 30s+)
            proxy_connect_timeout  60s;
            proxy_send_timeout     120s;
            proxy_read_timeout     300s;

            # Pas de buffer pour le streaming éventuel
            proxy_buffering off;
        }

        # ── Fichiers statiques frontend ────────────────────────────────────
        # Next.js exporte des pages .html — on gère le fallback
        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # ── Cache des assets statiques ─────────────────────────────────────
        location /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # ── Page d'erreur personnalisée ────────────────────────────────────
        error_page  404  /404.html;
        error_page  500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    # ════════════════════════════════════════════════════════════════════════
    # SERVEUR HTTPS (port 443) — Décommenter quand vous avez un certificat
    # ════════════════════════════════════════════════════════════════════════
    # server {
    #     listen       443 ssl http2;
    #     server_name  votre-domaine.com;
    #
    #     ssl_certificate      C:/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key  C:/nginx/ssl/privkey.pem;
    #     ssl_protocols        TLSv1.2 TLSv1.3;
    #     ssl_ciphers          HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Même configuration que le serveur HTTP ci-dessus
    #     root  "C:/Users/User/Desktop/Nouveau dossier/mon-workspace-hf/security/ai-soc-web/out";
    #     index index.html;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Frame-Options "SAMEORIGIN" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #
    #     location /api/ {
    #         proxy_pass         http://127.0.0.1:8000;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_connect_timeout  60s;
    #         proxy_send_timeout     120s;
    #         proxy_read_timeout     300s;
    #         proxy_buffering off;
    #     }
    #
